<!DOCTYPE html>
<html>
<head>
    <title>College Chatbot</title>

    <style>

        body{
        font-family: Arial;
        background:#ece5dd;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        }

        .chat-container{
        width:350px;
        background:white;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        display:flex;
        flex-direction:column;
        }

        .header{
        background:#075e54;
        color:white;
        padding:10px;
        font-weight:bold;
        text-align:center;
        }

        #chatbox{
        height:350px;
        overflow-y:auto;
        padding:10px;
        display:flex;
        flex-direction:column;
        }

        .user{
        align-self:flex-end;
        background:#dcf8c6;
        padding:8px 12px;
        border-radius:10px;
        margin:5px;
        max-width:70%;
        }

        .bot{
        align-self:flex-start;
        background:#ffffff;
        padding:8px 12px;
        border-radius:10px;
        margin:5px;
        max-width:70%;
        border:1px solid #ddd;
        }

        .input-area{
        display:flex;
        border-top:1px solid #ccc;
        }

        input{
        flex:1;
        padding:10px;
        border:none;
        outline:none;
        }

        button{
        background:#075e54;
        color:white;
        border:none;
        padding:10px 15px;
        cursor:pointer;
        }

    </style>

</head>

<body>


<div class="chat-container">
    <div class="header">
        College AI Assistant
    </div>

    <div id="chatbox"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Type a message">
        <button onclick="send()">Send</button>
    </div>

</div>

<script>

    function send(){

    let msg=document.getElementById("msg").value;

    let chatbox=document.getElementById("chatbox");

    chatbox.innerHTML += "<div class='user'>"+msg+"</div>";

    fetch("/chat?message="+msg)
    .then(res=>res.text())
    .then(data=>{
    chatbox.innerHTML += "<div class='bot'>"+data+"</div>";
    chatbox.scrollTop = chatbox.scrollHeight;
    });

    document.getElementById("msg").value="";

    }

</script>

</body>
</html>
